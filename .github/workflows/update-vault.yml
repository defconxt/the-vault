name: Update The Vault

on:
  schedule:
    # Every Sunday at 8 AM UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits)'
        required: false
        default: 'false'
        type: boolean
      skip_discover:
        description: 'Skip discovery (refresh only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the-vault repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: defconxt/the-vault
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run update pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.skip_discover }}" = "true" ]; then FLAGS="$FLAGS --skip-discover"; fi
          node update-pipeline.mjs $FLAGS

      - name: Generate README
        if: ${{ inputs.dry_run != 'true' }}
        run: node generate-readme.mjs

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git add tools.json README.md update-manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TOOL_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('tools.json','utf8')).length)")
            git commit -m "vault: weekly update — ${TOOL_COUNT} tools [automated]"
            git push
          fi
